services:

  db:
    image: mysql:8.0
    container_name: doloodoi_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE:      doloodoi_db
      MYSQL_USER:          ${DB_USER:-school_user}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-school_pass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: doloodoi_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: doloodoi_db
    volumes:
      - .:/app
      - ./frontend/static/uploads:/app/frontend/static/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: doloodoi_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./frontend/static/uploads:/app/frontend/static/uploads:ro
    depends_on:
      - backend

volumes:
  db_data:
